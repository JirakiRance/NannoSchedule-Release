<html lang="zh-CN">
<head>

        :root {
            --primary: #007aff;
            --bg: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
        }
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card-bg);
            width: 90%; max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 30px 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .logo {
            font-size: 60px;
            margin-bottom: 10px;
        }
        .title {
            font-size: 22px; font-weight: bold; color: var(--text-main); margin: 0 0 5px 0;
        }
        .version {
            font-size: 14px; color: var(--primary); font-weight: 500;
            background: #e5f1ff; padding: 4px 10px; border-radius: 12px; display: inline-block;
            margin-bottom: 20px;
        }
        .log-box {
            background: #f9f9f9; border-radius: 12px; padding: 15px; text-align: left;
            margin-bottom: 25px;
        }
        .log-title {
            font-size: 14px; font-weight: bold; color: var(--text-main); margin-bottom: 8px;
        }
        .log-list {
            margin: 0; padding-left: 20px; font-size: 14px; color: var(--text-sub); line-height: 1.6;
        }
        .download-btn {
            display: block; width: 100%;
            background-color: var(--primary); color: white;
            text-decoration: none; font-size: 16px; font-weight: bold;
            padding: 14px 0; border-radius: 12px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .download-btn:active { transform: scale(0.97); opacity: 0.9; }
        .footer { font-size: 12px; color: #999; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">

    <div class="version">最新版本 v1.1</div>

    <div class="log-box">
        <div class="log-title">✨ 更新日志：</div>
