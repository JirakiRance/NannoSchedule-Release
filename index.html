    <style>
        :root {
            --primary: #007aff;
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-sub: #8e8e93;
            /* 品牌色 */
            --color-direct: #ff9500;
            --color-github: #24292e;
            --color-gitee: #c71d23;
            --color-baidu: #2932e1;
            --color-pikpak: #34c759;
        }
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            background-color: var(--bg);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card-bg);
            width: 92%; max-width: 420px;
            border-radius: 28px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.08);
            padding: 35px 24px;
            text-align: center;
            box-sizing: border-box;
        }
        .logo-img {
            width: 84px; height: 84px;
            border-radius: 20px; margin-bottom: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            object-fit: cover;
        }
        .title { font-size: 24px; font-weight: 700; color: var(--text-main); margin: 0 0 6px 0; }
        .version-tag {
            font-size: 13px; color: var(--primary); font-weight: 600;
            background: rgba(0, 122, 255, 0.1); padding: 5px 14px; border-radius: 20px; 
            display: inline-block; margin-bottom: 24px;
        }
        .log-box {
            background: #f9f9fb; border-radius: 18px; padding: 20px; text-align: left;
            margin-bottom: 28px; border: 1px solid #f0f0f5;
        }
        .log-title { font-size: 15px; font-weight: 700; color: var(--text-main); margin-bottom: 12px; }
        .log-list { margin: 0; padding-left: 18px; font-size: 14px; color: #48484a; line-height: 1.8; }
        
        /* 按钮组 */
        .btn-group { display: flex; flex-direction: column; gap: 14px; }
        .download-btn {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; color: white; text-decoration: none;
            padding: 12px 0; border-radius: 16px;
            transition: all 0.2s ease;
        }
        .download-btn:active { transform: scale(0.97); opacity: 0.9; }
        .btn-main-text { font-size: 16px; font-weight: 700; display: flex; align-items: center; }
        .btn-sub-text { font-size: 11px; opacity: 0.8; margin-top: 2px; }
        .btn-icon { margin-right: 8px; font-size: 20px; }
        
        /* 品牌背景 */
        .btn-direct { background: linear-gradient(135deg, #ffb347, #ff9500); box-shadow: 0 4px 12px rgba(255,149,0,0.2); }
        .btn-github { background-color: var(--color-github); }
        .btn-gitee { background-color: var(--color-gitee); }
        .btn-baidu { background-color: var(--color-baidu); }
        .btn-pikpak { background-color: var(--color-pikpak); }
        
        .footer { font-size: 12px; color: var(--text-sub); margin-top: 30px; line-height: 1.6; }
